<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Learning Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e40af, #3b82f6);
      background-attachment: fixed;
    }
    .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
    input, select, textarea { background: white !important; color: #1f2937 !important; border-radius: 12px !important; }
  </style>
</head>
<body class="min-h-screen text-white">

  <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass p-8 md:p-12 rounded-3xl shadow-2xl w-full max-w-md">
      <h1 class="text-4xl font-bold text-center mb-8 tracking-tight">Smart Learning</h1>
      
      <div class="flex border-b border-white/20 mb-8">
        <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-4 font-semibold border-b-2 border-blue-400">Login</button>
        <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-4 font-semibold text-white/50">Register</button>
      </div>

      <div id="loginForm" class="space-y-4">
        <input id="loginEmail" type="email" placeholder="Email" class="w-full p-4">
        <input id="loginPassword" type="password" placeholder="Password" class="w-full p-4">
        <button onclick="login()" class="w-full bg-blue-500 hover:bg-blue-600 py-4 rounded-2xl font-bold text-lg transition-all">Login</button>
      </div>

      <div id="registerForm" class="hidden space-y-4">
        <input id="regName" type="text" placeholder="Full Name" class="w-full p-4">
        <input id="regEmail" type="email" placeholder="Email" class="w-full p-4">
        <input id="regPassword" type="password" placeholder="Password" class="w-full p-4">
        <select id="regRole" class="w-full p-4">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
        <input id="regSchool" type="text" placeholder="School Name" class="w-full p-4">
        <button onclick="register()" class="w-full bg-green-500 hover:bg-green-600 py-4 rounded-2xl font-bold text-lg transition-all">Create Account</button>
      </div>
    </div>
  </div>

  <div id="mainApp" class="hidden flex flex-col md:flex-row min-h-screen">
    <aside class="w-full md:w-72 bg-black/40 backdrop-blur-2xl p-6 flex flex-col border-r border-white/10">
      <div class="mb-10">
        <h2 class="text-2xl font-black tracking-tighter">SMART<span class="text-blue-400">LEARN</span></h2>
        <div class="mt-6 p-4 glass rounded-2xl">
          <p id="userName" class="font-bold truncate"></p>
          <p id="userRole" class="text-xs uppercase tracking-widest text-blue-300 font-bold"></p>
        </div>
      </div>

      <nav class="flex-1 space-y-2" id="sidebarNav"></nav>

      <button onclick="logout()" class="mt-10 text-red-400 hover:bg-red-500/10 p-4 rounded-2xl flex items-center gap-3 transition-all">
        <i class="fas fa-power-off"></i> Logout
      </button>
    </aside>

    <main class="flex-1 p-6 md:p-12 overflow-y-auto" id="contentArea"></main>
  </div>

<script>
// --- CORE DATA ---
let users = JSON.parse(localStorage.getItem('sl_users')) || [];
let assignments = JSON.parse(localStorage.getItem('sl_assignments')) || [];
let currentUser = null;

const save = () => {
  localStorage.setItem('sl_users', JSON.stringify(users));
  localStorage.setItem('sl_assignments', JSON.stringify(assignments));
};

function switchTab(tab) {
  document.getElementById('loginForm').classList.toggle('hidden', tab === 1);
  document.getElementById('registerForm').classList.toggle('hidden', tab === 0);
}

// --- AUTH ---
function register() {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const role = document.getElementById('regRole').value;
  const school = document.getElementById('regSchool').value;

  if(!name || !email || !password) return alert("Please fill all fields");
  
  users.push({
    id: 'U' + Date.now(),
    name, email, password, role, school,
    performance: [],
    discipline: []
  });
  save();
  alert("Account created!");
  switchTab(0);
}

function login() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  const user = users.find(u => u.email === email && u.password === pass);

  if(user) {
    currentUser = user;
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userName').innerText = user.name;
    document.getElementById('userRole').innerText = user.role;
    renderSidebar();
    navigate('dashboard');
  } else {
    alert("Invalid Credentials");
  }
}

// --- NAVIGATION ---
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const menu = [
    { n: 'Dashboard', i: 'fa-th-large', p: 'dashboard' },
    { n: 'Assignments', i: 'fa-book', p: 'assignments' },
    { n: 'Performance', i: 'fa-chart-line', p: 'performance' },
    { n: 'Discipline', i: 'fa-shield-halved', p: 'discipline' }
  ];

  if(currentUser.role === 'teacher') {
    menu.push({ n: 'Create Assignment', i: 'fa-plus-circle', p: 'create_assignment' });
    menu.push({ n: 'Manage Students', i: 'fa-users-cog', p: 'manage' });
  }

  nav.innerHTML = menu.map(m => `
    <button onclick="navigate('${m.p}')" class="w-full flex items-center gap-4 p-4 hover:bg-white/10 rounded-2xl transition-all">
      <i class="fas ${m.i} text-blue-400"></i> ${m.n}
    </button>
  `).join('');
}

function navigate(page) {
  const area = document.getElementById('contentArea');
  
  if(page === 'dashboard') {
    area.innerHTML = `<h1 class="text-4xl font-bold mb-6">Welcome, ${currentUser.name}</h1>
    <div class="glass p-8 rounded-3xl"><p>Select a tab from the sidebar to manage your academic profile.</p></div>`;
  }

  // STUDENT VIEW OF ASSIGNMENTS
  if(page === 'assignments') {
    area.innerHTML = `
      <h2 class="text-3xl font-bold mb-6">Active Assignments</h2>
      <div class="grid gap-4">
        ${assignments.length ? assignments.map(a => `
          <div class="glass p-6 rounded-2xl">
            <div class="flex justify-between items-start">
              <div>
                <span class="text-xs font-bold uppercase text-blue-400">${a.subject}</span>
                <h3 class="text-xl font-bold">${a.title}</h3>
                <p class="text-white/60 mt-2">${a.description}</p>
              </div>
              <div class="text-right">
                <p class="text-xs opacity-50 font-bold">DUE DATE</p>
                <p class="text-red-400 font-bold">${a.dueDate}</p>
              </div>
            </div>
          </div>
        `).join('') : '<p class="glass p-10 rounded-2xl text-center">No assignments posted yet.</p>'}
      </div>
    `;
  }

  // TEACHER: CREATE ASSIGNMENT
  if(page === 'create_assignment') {
    area.innerHTML = `
      <h2 class="text-3xl font-bold mb-6">Post New Assignment</h2>
      <div class="glass p-8 rounded-3xl max-w-2xl space-y-4">
        <input id="as_title" placeholder="Assignment Title" class="w-full p-4">
        <input id="as_subject" placeholder="Subject (e.g. Mathematics)" class="w-full p-4">
        <input id="as_due" type="date" class="w-full p-4">
        <textarea id="as_desc" placeholder="Instructions/Description" class="w-full p-4 h-32"></textarea>
        <button onclick="saveAssignment()" class="w-full bg-blue-500 py-4 rounded-xl font-bold">Publish to Students</button>
      </div>
    `;
  }

  if(page === 'performance') {
    const recs = currentUser.performance || [];
    area.innerHTML = `<h2 class="text-3xl font-bold mb-6">Your Performance</h2>
    <div class="space-y-4">${recs.map(r => `
      <div class="glass p-6 rounded-2xl flex justify-between">
        <div><h4 class="font-bold">${r.subject}</h4><p class="text-sm opacity-60">${r.remark}</p></div>
        <div class="text-2xl font-black text-blue-400">${r.score}%</div>
      </div>`).join('') || 'No records.'}</div>`;
  }

  if(page === 'discipline') {
    const logs = currentUser.discipline || [];
    area.innerHTML = `<h2 class="text-3xl font-bold mb-6">Discipline Log</h2>
    <div class="space-y-4">${logs.map(l => `
      <div class="bg-red-500/10 p-6 rounded-2xl border border-red-500/20">
        <h4 class="font-bold">${l.infraction}</h4><p class="text-sm italic">${l.action}</p>
      </div>`).join('') || 'Record is clean!'}</div>`;
  }

  if(page === 'manage') {
    const students = users.filter(u => u.role === 'student');
    area.innerHTML = `
      <h2 class="text-3xl font-bold mb-6">Manage Students</h2>
      <div class="grid gap-4">
        ${students.map(s => `
          <div class="glass p-6 rounded-2xl flex justify-between items-center">
            <div><p class="font-bold">${s.name}</p><p class="text-xs opacity-50">${s.school}</p></div>
            <div class="flex gap-2">
              <button onclick="openAction('${s.id}', 'grade')" class="bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold">Grade</button>
              <button onclick="openAction('${s.id}', 'disc')" class="bg-red-500 px-4 py-2 rounded-lg text-xs font-bold">Discipline</button>
            </div>
          </div>`).join('')}
      </div>`;
  }
}

// --- TEACHER LOGIC ---
function saveAssignment() {
  const title = document.getElementById('as_title').value;
  const subject = document.getElementById('as_subject').value;
  const dueDate = document.getElementById('as_due').value;
  const description = document.getElementById('as_desc').value;

  if(!title || !dueDate) return alert("Title and Due Date are required!");

  assignments.unshift({ title, subject, dueDate, description });
  save();
  alert("Assignment Published!");
  navigate('assignments');
}

function openAction(sid, type) {
  const student = users.find(u => u.id === sid);
  const area = document.getElementById('contentArea');
  if(type === 'grade') {
    area.innerHTML = `
      <h2 class="text-2xl font-bold mb-6">Grade: ${student.name}</h2>
      <div class="glass p-8 rounded-3xl max-w-md space-y-4">
        <input id="up_sub" placeholder="Subject" class="w-full p-4">
        <input id="up_score" type="number" placeholder="Score %" class="w-full p-4">
        <input id="up_rem" placeholder="Remarks" class="w-full p-4">
        <button onclick="finishAction('${sid}', 'grade')" class="w-full bg-green-600 py-4 rounded-xl">Save Result</button>
      </div>`;
  } else {
    area.innerHTML = `
      <h2 class="text-2xl font-bold mb-6">Discipline: ${student.name}</h2>
      <div class="glass p-8 rounded-3xl max-w-md space-y-4">
        <input id="up_inf" placeholder="Infraction" class="w-full p-4">
        <textarea id="up_act" placeholder="Action taken" class="w-full p-4"></textarea>
        <button onclick="finishAction('${sid}', 'disc')" class="w-full bg-red-600 py-4 rounded-xl">Save Record</button>
      </div>`;
  }
}

function finishAction(sid, type) {
  const idx = users.findIndex(u => u.id === sid);
  if(type === 'grade') {
    users[idx].performance.unshift({
      subject: document.getElementById('up_sub').value,
      score: document.getElementById('up_score').value,
      remark: document.getElementById('up_rem').value
    });
  } else {
    users[idx].discipline.unshift({
      infraction: document.getElementById('up_inf').value,
      action: document.getElementById('up_act').value
    });
  }
  save();
  alert("Student file updated!");
  navigate('manage');
}

function logout() {
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}
</script>
</body>
</html>
